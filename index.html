<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name - Developer Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/iphone-frame.css">
</head>
<body>
    <div class="stars"></div>
    
    <div class="phone-frame-wrapper">
        <div class="iphone-frame">
            <div class="notch"></div>
            <div class="screen">
                <div class="app-grid">
                    <a href="#about" class="app-icon">
                        <img src="images/about.png" alt="About">
                    </a>
                    <a href="#skills" class="app-icon">
                        <img src="images/skills.png" alt="Skills">
                    </a>
                    <a href="#projects" class="app-icon">
                        <img src="images/projects.png" alt="Projects">
                    </a>
                    <a href="#tools" class="app-icon">
                        <img src="images/tools.png" alt="Tools">
                    </a>
                    <a href="https://github.com/yourusername" class="app-icon">
                        <img src="images/github.png" alt="GitHub">
                    </a>
                    <a href="#experience" class="app-icon">
                        <img src="images/experience.png" alt="Experience">
                    </a>
                    <a href="https://vercel.com/dashboard" class="app-icon">
                        <img src="images/vercel.png" alt="Vercel">
                    </a>
                    <a href="https://www.linkedin.com/in/yourprofile" class="app-icon">
                        <img src="images/linkedin.png" alt="LinkedIn">
                    </a>
                    <a href="https://password-generator-steel-theta.vercel.app/" class="app-icon">
                        <img src="images/password_generator.png" alt="Password Generator">
                    </a>
                    <a href="https://tic-tac-toe-eight-gules.vercel.app/" class="app-icon">
                        <img src="images/tic_tac_toe.png" alt="Tic Tac Toe">
                    </a>
                    <a href="https://orcid.org/yourid" class="app-icon">
                        <img src="images/orcid.png" alt="ORCID">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <main class="content">
        <div class="intro">
            <h1>I'm Marco</h1>
            <div class="title-wrapper">
                <div class="title-line">
                    Software Developer <span class="plus">+</span>
                </div>
                <div class="title-line">
                    UI/UX Designer
                </div>
            </div>
            
            <p class="tagline">
                Welcome to my digital playground!
                <br>
                Software developer by day, UI/UX developer by night.
            </p>

            <div class="contact-section">
                <a href="#contact" class="contact-btn">Contact Me</a>
            </div>

            <div class="experience-stats">
                <div class="stat">
                    <span class="number">2.5+</span>
                    <span class="label">Years of Experience</span>
                </div>
                <div class="stat">
                    <span class="number">10+</span>
                    <span class="label">Projects Completed</span>
                </div>
                <div class="stat">
                    <span class="number">5+</span>
                    <span class="label">Happy Clients</span>
                </div>
                <div class="stat">
                    <span class="number">10+</span>
                    <span class="label">UI/UX Designs</span>
                </div>
            </div>
        </div>

        <div class="mascot-wrapper">
            <img src="images/linux-penguin.png" alt="Linux Mascot" class="mascot">
        </div>
    </main>

    <button class="view-toggle">
        <img src="images/mobile.png" alt="Toggle view" class="view-icon">
        <span>Mobile View</span>
    </button>
    <div class="cursor-follower"></div>
    <script src="js/view-toggle.js"></script>
    <script src="script.js"></script>
    <script src="js/cursor-follower.js"></script>
</body>
</html>
